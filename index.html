<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KStarMusic Store — 프로젝트 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F7F4;--surface:#FFF;--surface-alt:#F0EFEA;
  --text:#1A1A18;--text-2:#6B6B65;--text-3:#A0A098;
  --border:rgba(0,0,0,.06);
  --accent:#3B5BDB;--accent-soft:#EDF2FF;--accent-t:#364FC7;
  --green:#2B8A3E;--green-bg:#EBFBEE;--green-t:#2B8A3E;
  --amber:#E67700;--amber-bg:#FFF9DB;--amber-t:#E67700;
  --r:12px;--rl:16px;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111110;--surface:#1C1C1A;--surface-alt:#252523;
  --text:#E8E8E4;--text-2:#A0A098;--text-3:#6B6B65;
  --border:rgba(255,255,255,.07);
  --accent:#748FFC;--accent-soft:#1C2541;--accent-t:#91A7FF;
  --green-bg:#0B2B13;--green-t:#69DB7C;
  --amber-bg:#2C1B00;--amber-t:#FFD43B;
  --shadow:0 1px 3px rgba(0,0,0,.3);
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

.page{max-width:800px;margin:0 auto;padding:4rem 1.5rem 6rem}

/* Hero */
.hero{text-align:center;margin-bottom:3.5rem}
.logo{display:inline-flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.logo-mark{width:36px;height:36px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:20px;height:20px}
.logo-text{font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:600;letter-spacing:-.02em}
h1{font-family:'Outfit',sans-serif;font-size:2.2rem;font-weight:700;letter-spacing:-.04em;line-height:1.2;margin-bottom:.6rem}
.hero-sub{font-size:.95rem;color:var(--text-2);line-height:1.6}

/* Stats row */
.stats{display:flex;justify-content:center;gap:2rem;margin-bottom:3rem;flex-wrap:wrap}
.stat{text-align:center}
.stat-v{font-family:'Outfit',sans-serif;font-size:1.8rem;font-weight:700;letter-spacing:-.02em}
.stat-l{font-size:.75rem;color:var(--text-3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}

/* Report list */
.list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.list-title{font-family:'Outfit',sans-serif;font-size:1rem;font-weight:600;letter-spacing:-.01em}
.list-count{font-size:.78rem;color:var(--text-3)}

.report-card{
  display:flex;align-items:center;gap:16px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);
  padding:1.15rem 1.35rem;margin-bottom:10px;
  box-shadow:var(--shadow);
  text-decoration:none;color:inherit;
  transition:transform .15s,box-shadow .15s;
}
.report-card:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08)}

.report-date-box{
  width:52px;height:52px;border-radius:var(--r);
  background:var(--accent-soft);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;
}
.report-day{font-family:'Outfit',sans-serif;font-size:1.3rem;font-weight:700;color:var(--accent-t);line-height:1}
.report-mon{font-size:.65rem;font-weight:600;color:var(--accent-t);text-transform:uppercase;margin-top:2px}

.report-info{flex:1;min-width:0}
.report-title{font-size:.9rem;font-weight:600;margin-bottom:3px}
.report-meta{font-size:.78rem;color:var(--text-2);display:flex;gap:12px;flex-wrap:wrap}
.report-meta span{display:flex;align-items:center;gap:4px}

.report-arrow{
  width:32px;height:32px;border-radius:8px;
  background:var(--surface-alt);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:background .15s;
}
.report-card:hover .report-arrow{background:var(--accent);color:#fff}
.report-arrow svg{width:16px;height:16px}

.tag-sm{font-size:.66rem;font-weight:600;padding:2px 7px;border-radius:5px;white-space:nowrap}
.tag-latest{background:var(--green-bg);color:var(--green-t)}
.tag-changes{background:var(--amber-bg);color:var(--amber-t)}

.empty{text-align:center;padding:3rem;color:var(--text-3);font-size:.9rem}

/* Footer */
.footer{text-align:center;font-size:.72rem;color:var(--text-3);margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.footer a{color:var(--accent-t);text-decoration:none}

@media(max-width:480px){
  h1{font-size:1.6rem}
  .stats{gap:1.2rem}
  .stat-v{font-size:1.4rem}
  .report-card{padding:.9rem 1rem;gap:12px}
  .report-date-box{width:44px;height:44px}
  .report-day{font-size:1.1rem}
}
</style>
</head>
<body>
<div class="page">

  <div class="hero">
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2L3 6v8l7 4 7-4V6l-7-4z" stroke="#fff" stroke-width="1.5"/><path d="M10 10v8M3 6l7 4 7-4" stroke="#fff" stroke-width="1.5"/></svg></div>
      <span class="logo-text">KStarMusic Store</span>
    </div>
    <h1>프로젝트 대시보드</h1>
    <p class="hero-sub">OpenProject 기반 일일 프로젝트 진행 현황 보고서</p>
  </div>

  <div class="stats" id="stats"></div>

  <div class="list-header">
    <div class="list-title">일일 보고서</div>
    <div class="list-count" id="listCount"></div>
  </div>

  <div id="reportList"></div>

  <div class="footer">
    KStarMusic Store Project Dashboard · Powered by <a href="https://project.kstarmusic.com/projects/kstarmusicstore" target="_blank">OpenProject</a>
  </div>

</div>

<script>
const reports = [
  {
    date: '2026-03-23',
    title: 'Phase 6/7 closeout + bootstrap/auth hardening',
    file: 'reports/2026-03-23.html',
    summary: '전체 129건 · 완료 51 · 진행 9 · 대기 58',
    changes: 2,
    highlights: 'Phase 6/7 closeout 유지에 더해 empty DB Alembic bootstrap hardening과 shared@manage.header closeout, OpenProject #138/#143 갱신, 감사 장부 210/210을 반영함',
    latest: true
  },
  {
    date: '2026-03-22',
    title: 'Phase 0 board admin rail 진행 현황',
    file: 'reports/2026-03-22.html',
    summary: '전체 129건 · 완료 51 · 진행 8 · 대기 59',
    changes: 0,
    highlights: 'OpenProject 변경은 없었지만, git 기준으로 Phase 0 board rail 4건과 Phase 7 closeout 1건이 landed했고 PROGRESS/manual-findings가 03/22 기준으로 전진했다',
    latest: false
  },
  {
    date: '2026-03-20',
    title: 'Phase 4 Batch 3 slice 2 진행 현황',
    file: 'reports/2026-03-20.html',
    summary: '전체 129건 · 완료 51 · 진행 8 · 대기 59',
    changes: 2,
    highlights: 'stock_list 검색 helper와 adjustment export rail을 current path에 흡수하고 overview/warehouse-stock server filter, warehouse-settings nav directness까지 Batch 3 두 번째 슬라이스로 보강함',
    latest: false
  },
  {
    date: '2026-03-19',
    title: '03/20 새벽 마감 Phase 3 close 현황',
    file: 'reports/2026-03-19.html',
    summary: '전체 129건 · 완료 50 · 진행 9 · 대기 59',
    changes: 4,
    highlights: '03/20 06:00 KST 마감 기준으로 OpenProject #145 Closed와 Phase 3 고객 운영 close 증빙을 어제 기준 일일 보고서 형식으로 정리함',
    latest: false
  },
  {
    date: '2026-03-18',
    title: '엄격 포팅 재감사 진행 현황',
    file: 'reports/2026-03-18.html',
    summary: '전체 129건 · 완료 49 · 진행 9 · 대기 60',
    changes: 14,
    highlights: '03/19 새벽 마감 기준으로 Phase 2 strict 재감사, product_upload blocker 해결, 감사 완료 86 surface를 반영함',
    latest: false
  },
{
    date: '2026-03-17',
    title: '종합 프로젝트 진행 현황',
    file: 'reports/2026-03-17.html',
    summary: '전체 129건 · 완료 49 · 진행 9 · 대기 60',
    changes: 53,
    highlights: '엄격 패리티 기준으로 P0/Phase 2 재감사를 지속하고, product_list 화면 패리티 조정과 일정 재편을 반영함',
    latest: false
  }
];

const WEEKDAYS = ['일','월','화','수','목','금','토'];

function formatDate(ds) {
  const d = new Date(ds + 'T00:00:00');
  return { day: d.getDate(), mon: (d.getMonth()+1)+'월', weekday: WEEKDAYS[d.getDay()], full: ds };
}

// Stats
const statsEl = document.getElementById('stats');
statsEl.innerHTML = `
  <div class="stat"><div class="stat-v">${reports.length}</div><div class="stat-l">보고서</div></div>
  <div class="stat"><div class="stat-v">${reports[0].date.slice(5).replace('-','/')}</div><div class="stat-l">최신 기준일</div></div>
  <div class="stat"><div class="stat-v">${reports[0].changes}</div><div class="stat-l">최근 변경</div></div>
`;

// List
document.getElementById('listCount').textContent = `총 ${reports.length}건`;
const listEl = document.getElementById('reportList');

if (reports.length === 0) {
  listEl.innerHTML = '<div class="empty">아직 생성된 보고서가 없습니다.</div>';
} else {
  reports.forEach(r => {
    const dt = formatDate(r.date);
    const tags = [];
    if (r.latest) tags.push('<span class="tag-sm tag-latest">최신</span>');
    if (r.changes) tags.push(`<span class="tag-sm tag-changes">변경 ${r.changes}건</span>`);

    listEl.innerHTML += `
      <a class="report-card" href="${r.file}">
        <div class="report-date-box">
          <span class="report-day">${dt.day}</span>
          <span class="report-mon">${dt.mon}</span>
        </div>
        <div class="report-info">
          <div class="report-title">${r.date} (${dt.weekday}) ${r.title} ${tags.join(' ')}</div>
          <div class="report-meta">
            <span>${r.summary}</span>
          </div>
          <div class="report-meta" style="margin-top:2px">
            <span style="color:var(--text-3)">${r.highlights}</span>
          </div>
        </div>
        <div class="report-arrow">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 3l5 5-5 5"/></svg>
        </div>
      </a>`;
  });
}
</script>
</body>
</html>
